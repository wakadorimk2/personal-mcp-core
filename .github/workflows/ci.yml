name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: pytest
        run: pytest
